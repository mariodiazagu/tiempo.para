<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Tiempo para…</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --sand: #e8dcc8;
  --sand-mid: #d4c4a0;
  --sand-dark: #b09870;
  --ink: #2a2018;
  --ink-mid: #6b5840;
  --ink-light: #a08060;
  --gold: #c8a050;
  --gold-light: #e0c080;
  --bg: #f7f2ea;
  --bg2: #efe8d8;
}

html, body {
  width: 100%;
  min-height: 100vh;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
}

body {
  font-family: 'Jost', sans-serif;
  font-weight: 300;
  color: var(--ink);
  overflow-x: hidden;
}

.scene {
  position: relative;
  width: 100%;
  max-width: 390px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 3.5rem 2.5rem 4rem;
  overflow: hidden;
}

.bg-ornament {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

.bg-ornament svg {
  width: 100%;
  height: 100%;
}

.content {
  position: relative;
  z-index: 1;
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  gap: 0;
}

.top-rule {
  width: 1px;
  height: 48px;
  background: linear-gradient(to bottom, transparent, var(--sand-dark));
  margin-bottom: 2rem;
  opacity: 0;
  animation: fadeIn 1.2s ease 0.3s forwards;
}

.names {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-style: italic;
  font-size: 1.05rem;
  color: var(--ink-mid);
  letter-spacing: 0.12em;
  margin-bottom: 0.35rem;
  opacity: 0;
  animation: riseIn 1s ease 0.5s forwards;
}

.date-stamp {
  font-family: 'Jost', sans-serif;
  font-weight: 200;
  font-size: 0.62rem;
  letter-spacing: 0.35em;
  color: var(--ink-light);
  text-transform: uppercase;
  margin-bottom: 2.8rem;
  opacity: 0;
  animation: riseIn 1s ease 0.7s forwards;
}

.hourglass-container {
  position: relative;
  width: 90px;
  height: 156px;
  margin-bottom: 2.8rem;
  opacity: 0;
  animation: riseIn 1s ease 0.9s forwards;
}

.hourglass-svg {
  width: 100%;
  height: 100%;
}

.sand-waist {
  animation: waisGlow 3s ease-in-out infinite alternate;
}

.sand-stream {
  animation: streamFade 2s ease-in-out infinite alternate;
}

.sand-anim {
  animation: sandFall 2.2s ease-in infinite;
}

@keyframes waisGlow {
  0%   { opacity: 0.7; }
  100% { opacity: 0.5; }
}

@keyframes streamFade {
  0%   { opacity: 0.6; stroke-width: 2.5; }
  100% { opacity: 0.15; stroke-width: 1.5; }
}

@keyframes sandFall {
  0%   { transform: translateY(0);    opacity: 0.95; }
  65%  { transform: translateY(68px); opacity: 0.5; }
  66%  { transform: translateY(0);    opacity: 0; }
  67%  { opacity: 0.95; }
  100% { transform: translateY(0);    opacity: 0.95; }
}

.momento-badge {
  font-family: 'Jost', sans-serif;
  font-weight: 200;
  font-size: 0.5rem;
  letter-spacing: 0.7em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 0.9rem;
  opacity: 0;
  animation: fadeIn 1s ease 1.2s forwards;
}

.tiempo-pre {
  font-family: 'Jost', sans-serif;
  font-weight: 200;
  font-size: 0.75rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--ink-light);
  margin-bottom: 0.5rem;
  opacity: 0;
  animation: fadeIn 1s ease 1.4s forwards;
}

.frase-wrap {
  min-height: 140px;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  margin-bottom: 2.2rem;
  opacity: 0;
  animation: fadeIn 0.1s ease 1.5s forwards;
}

.frase {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-style: italic;
  font-size: 2.35rem;
  line-height: 1.2;
  color: var(--ink);
  letter-spacing: -0.015em;
  transition: opacity 0.45s cubic-bezier(.4,0,.2,1), transform 0.45s cubic-bezier(.4,0,.2,1);
  will-change: opacity, transform;
}

.frase.out {
  opacity: 0;
  transform: translateY(-14px);
}

.frase.in-enter {
  opacity: 0;
  transform: translateY(16px);
}

.ornament-line {
  display: flex;
  align-items: center;
  gap: 12px;
  width: 100%;
  max-width: 220px;
  margin-bottom: 2rem;
  opacity: 0;
  animation: fadeIn 1s ease 1.8s forwards;
}

.ornament-line::before,
.ornament-line::after {
  content: '';
  flex: 1;
  height: 0.5px;
  background: var(--sand-dark);
}

.ornament-diamond {
  width: 5px;
  height: 5px;
  background: var(--gold);
  transform: rotate(45deg);
  flex-shrink: 0;
}

.firma {
  font-family: 'Jost', sans-serif;
  font-weight: 200;
  font-size: 0.65rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--ink-light);
  margin-bottom: 1.5rem;
  opacity: 0;
  animation: fadeIn 1s ease 2s forwards;
}

.contador {
  margin-top: 1.5rem;
  font-family: 'Jost', sans-serif;
  font-weight: 200;
  font-size: 0.58rem;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--ink-light);
  opacity: 0;
  transition: opacity 0.8s ease;
  min-height: 18px;
}

.bottom-rule {
  width: 1px;
  height: 48px;
  background: linear-gradient(to top, transparent, var(--sand-dark));
  margin-top: 2rem;
  opacity: 0;
  animation: fadeIn 1.2s ease 2.5s forwards;
}

@keyframes riseIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

@media (max-height: 680px) {
  .top-rule, .bottom-rule { height: 28px; }
  .hourglass-container { margin-bottom: 1.8rem; }
  .date-stamp { margin-bottom: 1.8rem; }
}
</style>
</head>

function getMomento() {

  const isWeddingDay = now.toDateString() === BODA_DATE.toDateString();

  if (isWeddingDay) return 'boda';
  if (h >= 0 && h < 6) return 'madrugada';
  if (isWeekend && h >= 6 && h < 14) return 'findesemana_manana';
  if (isWeekend && h >= 14) return 'findesemana_tarde';
  if (h >= 6 && h < 12) return 'manana';
  if (h >= 12 && h < 15) return 'mediodia';
  if (h >= 15 && h < 20) return 'tarde';
  return 'noche';
}

const badges = {
  boda: 'Hoy es el gran día',
  madrugada: 'En la madrugada',
  manana: 'Esta mañana',
  mediodia: 'A mediodía',
  tarde: 'Esta tarde',
  noche: 'Esta noche',
  findesemana_manana: 'Fin de semana',
  findesemana_tarde: 'Fin de semana',
  universal: 'En cualquier momento'
};

const STORAGE_KEY = 'boda_reloj_v2';
let pool = [];
let indicePool = 0;
let visitas = 1;

function mezclar(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function construirPool(momento) {
  const especificas = mezclar(frases[momento] || []);
  const universales = mezclar(frases.universal);
  return [...especificas, ...universales, ...mezclar(especificas), ...mezclar(universales)];
}

function getVisitas() {
  try { return parseInt(localStorage.getItem(STORAGE_KEY) || '0', 10) || 0; } catch(e) { return 0; }
}
function setVisitas(n) {
  try { localStorage.setItem(STORAGE_KEY, String(n)); } catch(e) {}
}

function mostrarFrase(texto, animado) {
  const el = document.getElementById('fraseEl');
  if (!animado) {
    el.textContent = texto;
    el.style.opacity = '1';
    el.style.transform = 'none';
    return;
  }
  el.classList.add('out');
  setTimeout(() => {
    el.textContent = texto;
    el.classList.remove('out');
    el.classList.add('in-enter');
    requestAnimationFrame(() => requestAnimationFrame(() => {
      el.classList.remove('in-enter');
      el.style.opacity = '1';
      el.style.transform = 'none';
    }));
  }, 400);
}

window.addEventListener('DOMContentLoaded', () => {
  const momento = getMomento();
  pool = construirPool(momento);
  indicePool = Math.floor(Math.random() * Math.min(pool.length, frases[momento]?.length || pool.length));

  document.getElementById('momentoBadge').textContent = badges[momento] || 'En cualquier momento';

  visitas = getVisitas() + 1;
  setVisitas(visitas);

  setTimeout(() => {
    mostrarFrase(pool[indicePool], false);
  }, 1400);

  if (visitas > 1) {
    setTimeout(() => {
      const el = document.getElementById('contadorEl');
      el.textContent = 'Este reloj se ha abierto ' + visitas + ' veces';
      el.style.opacity = '1';
    }, 2800);
  }
});
</script>
